<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ability Haste Calculator</title>

<!-- Google Fonts: Cinzel (runic display font for headings), Inter (body text), JetBrains Mono (numbers/data) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- All styling lives in style.css -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Full-page background: two stacked splash-art layers that crossfade
     between each other (JS toggles their opacity), plus a dark gradient
     overlay on top so the UI stays readable. All fixed and behind
     everything else via z-index. -->
<div id="splashBg1" class="splash-layer"></div>
<div id="splashBg2" class="splash-layer"></div>
<div id="splashOverlay"></div>

<div class="layout">

  <!-- TOP BAR: brand + champion dropdown (filled in by populateChampSelect() in script.js) -->
  <div class="topbar">
    <div class="brand">HASTE<span>//</span>CALC</div>
    <select id="champSelect">
      <option value="">Loading champion roster...</option>
    </select>
  </div>

  <!-- MAIN AREA: replaced entirely by renderChampion() once a champion is picked -->
  <div class="main" id="main">
    <div class="placeholder">
      <div class="glyph">&#10022;</div>
      <div>Select a champion to view ability cooldowns</div>
    </div>
  </div>

</div>

<!-- All interactive logic lives in script.js, loaded last so the DOM above already exists -->
<script src="script.js"></script>
</body>
</html>
